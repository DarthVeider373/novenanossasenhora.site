<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>10 Orações para Proteção em Viagens e Jornadas</title>

  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/all.min.css">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      font-family: 'Lato', sans-serif;
      background: linear-gradient(135deg, #1a365d 0%, #0f2042 100%);
      background-attachment: fixed;
      color: white;
      min-height: 100vh;
      font-size: 18px;
      overflow-x: hidden;
    }

    .container {
      width: calc(100% - 32px);
      max-width: 1180px;
      margin: 0 auto;
      padding: 34px 24px 50px !important;
    }

    .title-font {
      font-family: 'Cinzel', serif;
    }

    .golden-text {
      color: #d4af37;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-divider {
      display: flex;
      align-items: center;
      margin: 34px auto;
      max-width: 1000px;
    }

    .divider-line {
      flex-grow: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, #d4af37, transparent);
    }

    .divider-icon {
      font-size: 28px;
      color: #d4af37;
      margin: 0 20px;
    }

    .back-btn {
      color: #d4af37;
      font-size: 1.05rem;
      font-weight: bold;
      margin-bottom: 26px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .back-btn:hover {
      color: #fff;
      text-decoration: underline;
    }

    .oracao-menu {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin: 0 auto 34px;
      max-width: 1050px;
    }

    .oracao-btn {
      background: rgba(212, 175, 55, 0.08);
      border: 2px solid #d4af37;
      color: #d4af37;
      border-radius: 999px;
      padding: 11px 22px;
      font-size: 0.96rem;
      font-family: 'Cinzel', serif;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
    }

    .oracao-btn.active,
    .oracao-btn:focus {
      background: linear-gradient(45deg, #d4af37, #f5e290);
      color: #0f2042;
      border-color: #fff;
      box-shadow: 0 8px 22px rgba(212, 175, 55, 0.2);
    }

    .oracao-btn:hover {
      background: #d4af37;
      color: #0f2042;
      transform: translateY(-2px);
    }

    .card-ora {
      background: rgba(10, 22, 46, 0.92);
      border: 2px solid #d4af37;
      border-radius: 20px;
      margin: 0 auto 28px;
      max-width: 1080px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .card-header {
      padding: 24px 26px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .card-header h3 {
      font-size: 1.2rem;
      margin: 0;
      color: #d4af37;
      font-family: 'Cinzel', serif;
      font-weight: 400;
    }

    .card-body {
      display: none;
      padding: 10px 26px 30px;
      font-size: 1.08rem;
      line-height: 1.75;
    }

    .card-body p {
      margin-bottom: 20px;
    }

    .card-ora.active .card-body {
      display: block;
      animation: fadeIn 0.4s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .btn-copiar {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.1);
      border: none;
      color: #d4af37;
      font-size: 1.05rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-left: 12px;
      transition: all 0.25s ease;
    }

    .btn-copiar:hover {
      background: rgba(212, 175, 55, 0.22);
      color: #fff;
    }

    .text-center.mt-4 {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 30px !important;
      flex-wrap: wrap;
      padding: 0 16px;
    }

    .btn-nav {
      min-width: 155px;
      height: 52px;
      border: none;
      font-weight: bold;
      padding: 0 30px;
      border-radius: 999px;
      font-size: 1.08rem;
      cursor: pointer;
      transition: all 0.25s ease;
      margin: 0;
    }

    #btnAnterior {
      background: #6d6d6d;
      color: #fff;
    }

    #btnProximo {
      background: linear-gradient(45deg, #d4af37, #f5e290);
      color: #0f2042;
    }

    .btn-nav:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
    }

    .btn-nav:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .text-center.mt-3.mb-4 {
      margin-top: 20px !important;
      padding: 0 16px;
    }

    .btn-outline-light {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 220px;
      padding: 13px 24px;
      border-radius: 14px;
      font-weight: bold;
      color: #fff !important;
      border: 1px solid rgba(255, 255, 255, 0.85) !important;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.03);
      transition: all 0.25s ease;
    }

    .btn-outline-light:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff !important;
      transform: translateY(-2px);
    }

    @media (max-width: 600px) {
      .container {
        width: calc(100% - 24px);
        padding: 24px 12px 38px !important;
      }

      h1 {
        font-size: 2rem;
      }

      .text-center.mb-4 {
        font-size: 1rem;
        line-height: 1.5;
      }

      .oracao-menu {
        flex-direction: column;
        gap: 10px;
      }

      .oracao-btn {
        width: 100%;
        text-align: center;
        padding: 12px 16px;
      }

      .card-header {
        padding: 20px 16px 6px;
      }

      .card-header h3 {
        font-size: 1.05rem;
      }

      .card-body {
        padding: 10px 16px 26px;
        font-size: 1rem;
        line-height: 1.7;
      }

      .text-center.mt-4 {
        gap: 12px;
        padding: 0;
      }

      .btn-nav {
        width: 100%;
        min-width: unset;
        height: 52px;
        margin: 0;
      }

      .text-center.mt-3.mb-4 {
        padding: 0;
      }

      .btn-outline-light {
        width: 100%;
        min-width: unset;
      }
    }
  </style>
</head>

<body>

  <div class="container py-4">

    <a href="https://novenanossasenhora.site/oracoes-especiais" class="back-btn">
      <i class="fas fa-arrow-left"></i>
      Voltar para o Início
    </a>

    <h1 class="title-font golden-text mb-2 text-center">
      10 Orações para Proteção em Viagens e Jornadas
    </h1>

    <p class="text-center mb-4">
      Escolha a oração para sua necessidade de viagem, leia com fé e compartilhe com quem vai partir para uma nova jornada.
    </p>

    <div class="section-divider">
      <div class="divider-line"></div>
      <div class="divider-icon">
        <i class="fas fa-plane"></i>
      </div>
      <div class="divider-line"></div>
    </div>

    <div class="oracao-menu" id="oracaoMenu"></div>

    <div id="oracoes-lista"></div>

    <div class="text-center mt-4">

      <button id="btnAnterior" class="btn-nav" disabled>
        <i class="fas fa-arrow-left"></i>
        Anterior
      </button>

      <button id="btnProximo" class="btn-nav">
        Próxima
        <i class="fas fa-arrow-right"></i>
      </button>

    </div>

    <div class="text-center mt-3 mb-4">

      <a href="https://novenanossasenhora.site/oracoes-especiais" class="btn btn-outline-light">
        <i class="fas fa-home me-2"></i>
        Voltar ao Início
      </a>

    </div>

  </div>

  <script>
    const oracoes = [
      {
        titulo: 'Oração para Viagem Segura',
        texto: `<p>Senhor dos Caminhos, peço-Te proteção para esta viagem que se inicia.</p><p>Guia cada passo, cada quilômetro, cada decisão ao longo do trajeto.</p><p>Livra de acidentes, imprevistos, perigos e de toda influência do mal.</p><p>Que os anjos acompanhem o veículo, os motoristas e todos os passageiros, trazendo paz e serenidade ao coração.</p><p>Que a chegada seja tranquila, o retorno abençoado e que a gratidão seja constante em cada parada.</p><p>Amém.</p>`
      },
      {
        titulo: 'Oração contra Perigos na Estrada',
        texto: `<p>Deus protetor, coloco em Tuas mãos cada trecho da estrada que será percorrida.</p><p>Afasta motoristas imprudentes, animais, buracos, tempestades e todo tipo de risco.</p><p>Que a atenção seja redobrada, o cansaço não domine e que a prudência seja companheira fiel.</p><p>Que a viagem seja tranquila, sem pressa, e que o destino seja alcançado sob Tua bênção.</p><p>Amém.</p>`
      },
      {
        titulo: 'Oração de Proteção Aérea',
        texto: `<p>Senhor dos Céus, peço-Te proteção para este voo.</p><p>Guia os pilotos, abençoa a tripulação e tranquiliza o coração de todos os passageiros.</p><p>Que o avião seja envolto por Tua luz, que as turbulências sejam superadas e que o pouso seja seguro.</p><p>Que a viagem seja motivo de alegria e reencontros felizes.</p><p>Amém.</p>`
      },
      {
        titulo: 'Oração de Proteção Marítima',
        texto: `<p>Deus das Águas, protege cada embarcação, cada tripulante e cada passageiro que navega pelos mares, rios ou lagos.</p><p>Afasta tempestades, naufrágios, perigos ocultos e todo tipo de ameaça.</p><p>Que a travessia seja calma, que o vento seja favorável e que a chegada seja celebrada com alegria.</p><p>Amém.</p>`
      },
      {
        titulo: 'Oração para Retorno Abençoado',
        texto: `<p>Senhor, agradeço pela viagem realizada e peço-Te um retorno abençoado.</p><p>Que a saudade seja alívio, que o reencontro seja motivo de festa e que a bagagem traga não só lembranças, mas também aprendizados.</p><p>Que o lar seja refúgio de paz e que a gratidão seja a primeira oração ao chegar.</p><p>Amém.</p>`
      },
      {
        titulo: 'Oração de Guia para o Anjo Condutor',
        texto: `<p>Anjo do Senhor, peço-Te que conduzas o veículo, os passos e as decisões durante toda a viagem.</p><p>Que a intuição seja aguçada, que o caminho seja iluminado e que a proteção seja constante.</p><p>Que a presença do anjo seja sentida em cada curva, em cada parada e em cada chegada.</p><p>Amém.</p>`
      },
      {
        titulo: 'Oração contra Tempestades e Obstáculos',
        texto: `<p>Deus do Tempo e da Natureza, peço-Te que acalmes as tempestades, desvie obstáculos e proteja contra todo tipo de adversidade climática.</p><p>Que a viagem não seja interrompida por chuvas, ventos ou imprevistos, e que a serenidade reine em cada momento.</p><p>Amém.</p>`
      },
      {
        titulo: 'Oração de Paz em Terras Estranhas',
        texto: `<p>Senhor, ao chegar em terras desconhecidas, peço-Te paz, acolhimento e proteção.</p><p>Que eu encontre pessoas de bom coração, que a comunicação seja facilitada e que a saudade seja amenizada pela alegria de novas experiências.</p><p>Que eu me sinta seguro, respeitado e abençoado em cada lugar por onde passar.</p><p>Amém.</p>`
      },
      {
        titulo: 'Oração pela Saúde em Deslocamentos',
        texto: `<p>Deus da Vida, protege minha saúde e a de todos que viajam comigo.</p><p>Afasta doenças, mal-estares, acidentes e qualquer situação que possa comprometer o bem-estar.</p><p>Que a alimentação seja saudável, o descanso seja suficiente e que a energia seja renovada a cada dia.</p><p>Amém.</p>`
      },
      {
        titulo: 'Oração de Gratidão pela Jornada',
        texto: `<p>Senhor, agradeço por cada quilômetro percorrido, por cada paisagem contemplada e por cada pessoa encontrada no caminho.</p><p>Que a jornada seja lembrada com alegria, que os aprendizados sejam levados para a vida e que a gratidão seja a última oração ao final de cada viagem.</p><p>Amém.</p>`
      }
    ];

    let current = 0;

    function renderOracao(idx) {
      const lista = document.getElementById('oracoes-lista');
      lista.innerHTML = '';

      const ora = oracoes[idx];

      const card = document.createElement('div');
      card.className = 'card-ora active';
      card.id = 'card-oracao';

      card.innerHTML = `
        <div class="card-header">
          <h3>${ora.titulo}</h3>

          <button class="btn-copiar" title="Copiar oração" onclick="navigator.clipboard.writeText(document.getElementById('texto-ora').innerText)">
            <i class="fas fa-copy"></i>
          </button>
        </div>

        <div class="card-body">
          <span id="texto-ora">${ora.texto}</span>
        </div>
      `;

      lista.appendChild(card);

      document.getElementById('btnAnterior').disabled = idx === 0;
      document.getElementById('btnProximo').disabled = idx === oracoes.length - 1;

      document.querySelectorAll('.oracao-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === idx);
      });

      setTimeout(() => {
        document.getElementById('card-oracao').scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      }, 100);
    }

    document.getElementById('btnAnterior').onclick = function () {
      if (current > 0) {
        current--;
        renderOracao(current);
      }
    };

    document.getElementById('btnProximo').onclick = function () {
      if (current < oracoes.length - 1) {
        current++;
        renderOracao(current);
      }
    };

    const menu = document.getElementById('oracaoMenu');

    oracoes.forEach((ora, i) => {
      const btn = document.createElement('button');

      btn.className = 'oracao-btn' + (i === 0 ? ' active' : '');
      btn.innerText = ora.titulo;

      btn.onclick = () => {
        current = i;
        renderOracao(i);
      };

      menu.appendChild(btn);
    });

    renderOracao(current);
  </script>

</body>

</html>
